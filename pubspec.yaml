name: iot_drainage
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.7.3
  google_fonts: ^8.1.0
  firebase_core: ^4.10.0
  firebase_messaging: ^16.3.0
  http: ^1.6.0
  web_socket_channel: ^3.0.1
  shared_preferences: ^2.3.2
  flutter_local_notifications: ^18.0.1
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0


flutter:

  uses-material-design: true

  assets:
    - assets/
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/pd_logo.png"
  adaptive_icon_foreground: "assets/images/pd_foreground.png"
  adaptive_icon_background: "assets/images/pd_background.png"

flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#FFFFFF"
  image: "assets/images/splash_logo_pd.png"
  android: true
  ios: true

  android_12:
    image: "assets/images/splash_logo_pd.png"
    color: "#FFFFFF"
    color_dark: "#FFFFFF"

get_cli:
  sub_folder: true
